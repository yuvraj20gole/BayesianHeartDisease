name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  checkout-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Verify tree
        run: test -f README.md && test -d api && test -d frontend
